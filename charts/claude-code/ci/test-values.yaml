# CI test values for Claude Code Helm chart
# Used for helm lint and template validation

credentials:
  anthropicApiKey: "sk-ant-test-key"
  secretData:
    ANTHROPIC_BASE_URL: "https://example.invalid"

env:
  TZ: "America/New_York"
  NODE_ENV: "development"

persistence:
  enabled: true
  size: 1Gi

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

serviceAccount:
  create: true
  annotations:
    test-annotation: "true"

podAnnotations:
  prometheus.io/scrape: "false"
