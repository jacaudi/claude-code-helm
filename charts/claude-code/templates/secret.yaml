{{- $shouldCreateSecret := and (not .Values.credentials.existingSecret) (or .Values.credentials.anthropicApiKey (not (empty .Values.credentials.secretData))) -}}
{{- if $shouldCreateSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "claude-code.secretName" . }}
  labels:
    {{- include "claude-code.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.credentials.anthropicApiKey }}
  ANTHROPIC_API_KEY: {{ .Values.credentials.anthropicApiKey | b64enc | quote }}
  {{- end }}
  {{- range $key, $value := .Values.credentials.secretData }}
  {{ $key }}: {{ $value | b64enc | quote }}
  {{- end }}
{{- end }}
