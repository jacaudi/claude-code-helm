---
# CI/CD Pipeline for claude-pod
# Lints, releases (semantic-release), then builds the container image and
# publishes the Helm chart at the same version.
name: CI/CD

"on":
  push:
    branches: [main]
  workflow_dispatch:

# Only allow one release at a time - queue subsequent runs
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: write

jobs:
  lint:
    uses: jacaudi/github-actions/.github/workflows/component-lint.yml@v0.20.3
    permissions:
      contents: read
    with:
      yaml: true
      helm: true
      helm-chart-path: 'charts/claude-pod'

  release:
    needs: [lint]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: jacaudi/github-actions/.github/workflows/component-semantic-release.yml@v0.20.3
    permissions:
      contents: write
      issues: write
      pull-requests: write
    with:
      use-github-app: true
      extra-plugins: '@semantic-release/changelog @semantic-release/git @semantic-release/exec'
    secrets:
      app-id: ${{ secrets.APP_ID }}
      app-private-key: ${{ secrets.APP_PRIVATE_KEY }}

  container:
    needs: [release]
    if: needs.release.outputs.new-release-published == 'true'
    uses: jacaudi/github-actions/.github/workflows/component-container-build.yml@v0.20.3
    permissions:
      contents: read
      packages: write
    with:
      image-name: ${{ github.repository_owner }}/claude-pod
      file: Containerfile
      platforms: 'linux/amd64,linux/arm64'
      version: ${{ needs.release.outputs.new-release-version }}
      tags: |
        ghcr.io/${{ github.repository_owner }}/claude-pod:${{ needs.release.outputs.new-release-version-v }}
        ghcr.io/${{ github.repository_owner }}/claude-pod:latest

  helm:
    needs: [release, container]
    if: needs.release.outputs.new-release-published == 'true'
    uses: jacaudi/github-actions/.github/workflows/component-helm-publish.yml@v0.20.3
    permissions:
      contents: read
      packages: write
    with:
      chart-name: claude-pod
      chart-path: charts/claude-pod
      repository: ${{ github.repository_owner }}/charts
      version: ${{ needs.release.outputs.new-release-version-v }}
      registry: ghcr.io
      registry-username: ${{ github.repository_owner }}
