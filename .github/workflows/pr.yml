---
# Pull Request Validation
# Fast feedback on PRs: lint and native multi-arch container builds (no push).
name: PR Validation

"on":
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    name: Lint
    uses: jacaudi/github-actions/.github/workflows/component-lint.yml@v0.20.3
    with:
      yaml: true
      helm: true
      helm-chart-path: 'charts/claude-pod'

  container-amd64:
    name: Build Container (amd64)
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build (amd64)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Containerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: claude-pod:pr-${{ github.event.pull_request.number }}-amd64
          cache-from: type=gha,scope=amd64
          cache-to: type=gha,mode=max,scope=amd64

  container-arm64:
    name: Build Container (arm64)
    needs: [lint]
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build (arm64)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Containerfile
          platforms: linux/arm64
          push: false
          load: true
          tags: claude-pod:pr-${{ github.event.pull_request.number }}-arm64
          cache-from: type=gha,scope=arm64
          cache-to: type=gha,mode=max,scope=arm64
